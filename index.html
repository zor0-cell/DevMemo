<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>DevMemo // Твой Код-Блокнот</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      overscroll-behavior: none;
    }

    .code-font {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #09090b;
    }

    ::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3f3f46;
    }

    .transition-sidebar {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Мобильные улучшения и адаптация */
    @media (max-width: 768px) {
      .main-content-area {
        flex-direction: column !important;
      }

      .editor-panel {
        width: 100% !important;
        height: 60% !important;
        border-right: none !important;
        border-bottom: 1px solid #27272a;
      }

      .notes-panel {
        width: 100% !important;
        height: 40% !important;
      }

      textarea, input {
        font-size: 16px !important;
      }
      
      .sidebar {
        width: 85% !important;
        max-width: 320px;
      }
    }

    @media (max-width: 480px) {
      .sidebar {
        width: 100% !important;
        max-width: 100%;
      }
    }
  </style>
</head>

<body class="bg-[#09090b] text-zinc-100 flex flex-col h-screen overflow-hidden">

  <!-- Мобильный переключатель сайдбара -->
  <div class="md:hidden fixed top-3 left-3 z-50">
    <button onclick="toggleSidebar()" id="menuToggle" aria-label="Открыть меню"
      class="bg-[#121214] border border-zinc-800 rounded-xl p-2.5 text-zinc-400 hover:text-white transition-colors shadow-xl active:scale-95">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
        class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>
  </div>

  <!-- Основной контейнер -->
  <div class="flex flex-1 overflow-hidden main-wrapper relative">

    <!-- Сайдбар -->
    <aside id="sidebar"
      class="sidebar w-80 bg-[#121214] border-r border-zinc-800 flex flex-col flex-shrink-0 transition-sidebar md:relative fixed inset-y-0 left-0 z-40 md:z-auto -translate-x-full md:translate-x-0">
      
      <!-- Шапка сайдбара -->
      <div class="p-4 md:p-5 border-b border-zinc-800 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-cyan-500 flex items-center justify-center text-white font-bold text-sm shadow-lg shadow-indigo-500/20">
            D
          </div>
          <h1 class="text-lg font-bold tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
            DevMemo
          </h1>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-xs text-zinc-500 font-mono px-2 py-0.5 bg-zinc-800/50 rounded border border-zinc-700/50">v1.4</span>
          <button onclick="toggleSidebar()" class="md:hidden text-zinc-500 hover:text-white p-1" aria-label="Закрыть меню">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
              class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Поиск -->
      <div class="p-3 md:p-4 border-b border-zinc-800/60 flex flex-col gap-2">
        <input type="text" id="searchBar" oninput="renderSidebar()" placeholder="Поиск по названию или коду..."
          class="w-full bg-[#18181b] border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-300 placeholder-zinc-600 focus:outline-none focus:border-indigo-500 transition-colors">
      </div>

      <!-- Список сниппетов -->
      <div id="snippetList" class="flex-1 overflow-y-auto p-2 md:p-3 space-y-1"></div>

      <!-- Панель импорта/экспорта и кнопка создания -->
      <div class="p-3 md:p-4 border-t border-zinc-800 bg-[#0e0e10] flex flex-col gap-2">
        <div class="grid grid-cols-2 gap-2">
          <button onclick="exportData()" class="text-xs py-2 px-3 bg-zinc-900 border border-zinc-800 hover:bg-zinc-800 rounded-lg text-zinc-300 font-medium transition-colors active:scale-95">
            Экспорт JSON
          </button>
          <label class="text-xs py-2 px-3 bg-zinc-900 border border-zinc-800 hover:bg-zinc-800 rounded-lg text-zinc-300 font-medium transition-colors text-center cursor-pointer active:scale-95">
            Импорт JSON
            <input type="file" id="importFile" accept=".json" onchange="importData(event)" class="hidden">
          </label>
        </div>
        <button onclick="createNewSnippet()"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-sm py-3 px-4 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/10 active:scale-[0.98]">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
            class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          Добавить код
        </button>
      </div>
    </aside>

    <!-- Затемнение для мобильного меню -->
    <div id="overlay" onclick="toggleSidebar()"
      class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 hidden"></div>

    <!-- Основная область -->
    <main class="flex-1 flex flex-col h-full bg-[#09090b] relative min-h-0">

      <!-- Пустое состояние -->
      <div id="emptyState"
        class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 z-10 bg-[#09090b]">
        <div class="w-16 h-16 rounded-2xl bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-500 mb-4 shadow-xl">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="w-8 h-8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5" />
          </svg>
        </div>
        <h3 class="text-zinc-300 font-semibold text-lg">Блокнот готов к работе</h3>
        <p class="text-zinc-500 text-sm max-w-sm mt-1 px-4">Выберите сохраненный код слева или создайте новый. Все изменения записываются автоматически.</p>
      </div>

      <!-- Основной контент -->
      <div id="mainContent" class="hidden flex-1 flex flex-col h-full z-20 min-h-0">
        
        <!-- Верхняя панель управления -->
        <div class="min-h-[60px] md:h-[69px] border-b border-zinc-800 px-3 md:px-6 py-2 flex items-center justify-between bg-[#0c0c0e]/50 backdrop-blur-md flex-wrap gap-2">
          
          <!-- Название -->
          <div class="flex items-center gap-2 md:gap-4 flex-1 min-w-[120px]">
            <input type="text" id="snippetTitle" oninput="autoSave()" placeholder="Название записи..."
              class="bg-transparent border-none text-base md:text-xl font-bold text-zinc-100 focus:outline-none w-full placeholder-zinc-700 min-w-[80px]">
          </div>

          <!-- Инструменты -->
          <div class="header-tools flex items-center gap-1 md:gap-3 flex-shrink-0">
            <div id="saveStatus" class="text-[10px] md:text-xs font-mono text-zinc-500 flex items-center gap-1.5 selection:bg-transparent whitespace-nowrap">
              <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
              <span>Сохранено</span>
            </div>

            <!-- Переключатель переноса строк -->
            <button onclick="toggleWordWrap()" title="Перенос строк" id="wrapBtn"
              class="text-zinc-400 hover:text-zinc-200 bg-zinc-900 border border-zinc-800 rounded-lg p-2 transition-all active:scale-95">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 5.25h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5m-16.5 4.5h11.25" />
              </svg>
            </button>

            <!-- Копировать -->
            <button id="copyBtn" onclick="copyCode()"
              class="hidden text-xs font-medium text-zinc-400 hover:text-zinc-200 bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 transition-all flex items-center gap-1.5 active:scale-95 whitespace-nowrap">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 7.5V6.108c0-1.135.845-2.098 1.976-2.192.373-.03.748-.057 1.123-.08M15.75 18H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08M15.75 18.75v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5A3.375 3.375 0 006.375 7.5H5.25m11.9-3.664A2.251 2.251 0 0015 2.25h-1.5a2.251 2.251 0 00-2.15 1.586m5.8 0c.065.21.1.433.1.664v.75h-6V4.5c0-.231.035-.454.1-.664M6.75 7.5H4.875c-.621 0-1.125.504-1.125 1.125v4.125c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V8.625c0-.621-.504-1.125-1.125-1.125H12" />
              </svg>
              <span id="copyBtnText">Копировать</span>
            </button>

            <!-- Удалить -->
            <button onclick="deleteCurrentSnippet()" title="Удалить запись"
              class="text-zinc-500 hover:text-rose-400 bg-zinc-950 hover:bg-rose-950/20 border border-zinc-800 hover:border-rose-900/50 rounded-lg p-2 transition-all active:scale-95 flex items-center gap-1 text-xs font-medium">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
              </svg>
              <span class="hidden sm:inline">Удалить</span>
            </button>
          </div>
        </div>

        <!-- Редакторы -->
        <div class="flex-1 flex overflow-hidden main-content-area">
          
          <!-- Редактор кода -->
          <div class="editor-panel w-2/3 h-full flex flex-col border-r border-zinc-800">
            <div class="bg-[#0c0c0e] px-4 py-1.5 border-b border-zinc-800/80 flex items-center justify-between">
              <div class="flex items-center gap-3">
                <span class="text-[10px] md:text-xs font-mono text-zinc-500 uppercase tracking-wider">Код</span>
                <span id="charCount" class="text-[10px] font-mono text-zinc-600">Символов: 0</span>
              </div>
              <input type="text" id="snippetLang" oninput="autoSave()" placeholder="Язык (например, JS)"
                class="bg-transparent border-none text-right text-[10px] md:text-xs font-mono text-indigo-400 focus:outline-none w-32 placeholder-zinc-600">
            </div>
            <textarea id="snippetCode" oninput="autoSaveCode()" spellcheck="false"
              class="code-font flex-1 w-full bg-[#050506] p-4 md:p-6 text-zinc-200 focus:outline-none resize-none leading-relaxed whitespace-pre overflow-auto"
              placeholder="// Вставьте или напишите свой код сюда... (Поддерживается клавиша Tab)"></textarea>
          </div>

          <!-- Панель заметок -->
          <div class="notes-panel w-1/3 h-full flex flex-col bg-[#0b0b0d]">
            <div class="bg-[#0c0c0e] px-4 py-1.5 border-b border-zinc-800/80">
              <span class="text-[10px] md:text-xs font-mono text-zinc-500 uppercase tracking-wider">Заметки / Описание</span>
            </div>
            <textarea id="snippetNotes" oninput="autoSave()"
              class="flex-1 w-full bg-transparent p-4 md:p-5 text-zinc-400 focus:outline-none resize-none text-sm leading-relaxed placeholder-zinc-700"
              placeholder="Объяснение кода, ссылки или полезные шпаргалки к этому коду..."></textarea>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Модальное окно подтверждения удаления -->
  <div id="deleteModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center hidden">
    <div class="bg-[#121214] border border-zinc-800 rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl">
      <h3 class="text-zinc-200 font-semibold text-lg mb-2">Удалить эту запись?</h3>
      <p class="text-zinc-500 text-sm mb-6">Это действие нельзя будет отменить. Запись будет удалена безвозвратно.</p>
      <div class="flex justify-end gap-3">
        <button onclick="closeDeleteModal()" class="px-4 py-2 bg-zinc-900 hover:bg-zinc-800 text-zinc-300 rounded-xl text-sm transition-colors active:scale-95">Отмена</button>
        <button onclick="confirmDelete()" class="px-4 py-2 bg-rose-600 hover:bg-rose-500 text-white rounded-xl text-sm transition-all active:scale-[0.98]">Удалить</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      // ===== ЗАГРУЗКА ДАННЫХ =====
      let snippets = [];
      try {
        const stored = localStorage.getItem('dev_memo_snippets');
        if (stored) {
          const parsed = JSON.parse(stored);
          if (Array.isArray(parsed)) {
            snippets = parsed;
          }
        }
      } catch (e) {
        console.error('Ошибка загрузки данных:', e);
        snippets = [];
      }

      let currentId = null;
      let saveTimeout = null;
      let sidebarOpen = false;
      let isWordWrap = false;
      let idToDelete = null;

      // ===== ГЕНЕРАЦИЯ УНИКАЛЬНОГО ID =====
      function generateUniqueId() {
        return Date.now().toString() + '_' + Math.random().toString(36).substring(2, 11);
      }

      // ===== СОЗДАНИЕ ДЕМО-ЗАПИСИ =====
      if (snippets.length === 0) {
        snippets.push({
          id: generateUniqueId(),
          title: 'Привет, DevMemo!',
          code: 'console.log("Добро пожаловать в DevMemo!");\n\n// Здесь можно хранить куски кода и заметки.\n// Изменения сохраняются на лету.',
          notes: 'Это ваши заметки к коду. Поддерживается быстрый поиск по содержимому кода и названию.',
          lang: 'JavaScript'
        });
        saveToStorage();
      }

      // ===== БЕЗОПАСНОЕ ЭКРАНИРОВАНИЕ =====
      function escapeHTML(str) {
        if (!str) return '';
        const map = {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#039;'
        };
        return str.replace(/[&<>"']/g, function(m) { return map[m]; });
      }

      // ===== ГЛОБАЛЬНЫЙ БИНДИНГ =====
      window.renderSidebar = renderSidebar;
      window.createNewSnippet = createNewSnippet;
      window.selectSnippet = selectSnippet;
      window.autoSave = autoSave;
      window.autoSaveCode = autoSaveCode;
      window.deleteSnippetInline = deleteSnippetInline;
      window.deleteCurrentSnippet = deleteCurrentSnippet;
      window.closeDeleteModal = closeDeleteModal;
      window.confirmDelete = confirmDelete;
      window.copyCode = copyCode;
      window.toggleSidebar = toggleSidebar;
      window.toggleWordWrap = toggleWordWrap;
      window.exportData = exportData;
      window.importData = importData;

      // ===== ОБРАБОТКА TAB В РЕДАКТОРЕ =====
      const codeArea = document.getElementById('snippetCode');
      codeArea.addEventListener('keydown', function (e) {
        if (e.key === 'Tab') {
          e.preventDefault();
          const start = this.selectionStart;
          const end = this.selectionEnd;
          this.value = this.value.substring(0, start) + "  " + this.value.substring(end);
          this.selectionStart = this.selectionEnd = start + 2;
          autoSaveCode();
        }
      });

      // ===== ИНИЦИАЛИЗАЦИЯ =====
      renderSidebar();
      if (snippets.length > 0) {
        selectSnippet(snippets[0].id);
      }

      // ===== ФУНКЦИИ =====

      function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        sidebarOpen = !sidebarOpen;

        if (sidebarOpen) {
          sidebar.classList.remove('-translate-x-full');
          sidebar.classList.add('translate-x-0');
          overlay.classList.remove('hidden');
          document.body.style.overflow = 'hidden';
        } else {
          sidebar.classList.add('-translate-x-full');
          sidebar.classList.remove('translate-x-0');
          overlay.classList.add('hidden');
          document.body.style.overflow = '';
        }
      }

      function closeSidebarMobile() {
        if (window.innerWidth <= 768 && sidebarOpen) {
          toggleSidebar();
        }
      }

      function renderSidebar() {
        const listContainer = document.getElementById('snippetList');
        const searchQuery = document.getElementById('searchBar').value.toLowerCase();
        listContainer.innerHTML = '';

        const filtered = snippets.filter(s =>
          (s.title || '').toLowerCase().includes(searchQuery) ||
          (s.code || '').toLowerCase().includes(searchQuery)
        );

        if (filtered.length === 0) {
          listContainer.innerHTML = `<div class="text-center text-xs text-zinc-600 py-8">Ничего не найдено</div>`;
          return;
        }

        filtered.forEach(snippet => {
          const isActive = snippet.id === currentId;
          const item = document.createElement('div');

          item.className = `p-3 rounded-xl cursor-pointer transition-all duration-150 flex flex-col gap-1 group relative border ${
            isActive
              ? 'bg-indigo-600/10 border-indigo-500/30 text-white'
              : 'hover:bg-zinc-800/40 text-zinc-400 hover:text-zinc-200 border-transparent'
          }`;

          item.addEventListener('click', (e) => {
            if (e.target.closest('.delete-inline-btn')) return;
            selectSnippet(snippet.id);
          });

          const escapedTitle = escapeHTML(snippet.title) || 'Новый код...';
          const escapedLang = escapeHTML(snippet.lang) || 'Code';
          const escapedNotes = escapeHTML(snippet.notes) || 'Нет описания...';

          item.innerHTML = `
            <div class="flex items-center justify-between pr-8">
              <span class="font-medium text-sm truncate max-w-[130px] md:max-w-[160px] ${isActive ? 'text-indigo-300' : 'text-zinc-200'}">${escapedTitle}</span>
              <span class="text-[10px] font-mono px-1.5 py-0.5 bg-zinc-800 text-zinc-400 rounded border border-zinc-700/50 transition-colors">${escapedLang}</span>
            </div>
            <span class="text-xs text-zinc-500 truncate pr-8">${escapedNotes}</span>
            
            <button class="delete-inline-btn absolute right-2 top-1/2 -translate-y-1/2 p-1.5 rounded-lg text-zinc-500 hover:text-rose-400 hover:bg-rose-950/30 md:opacity-0 group-hover:opacity-100 transition-all duration-150" title="Удалить запись">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
              </svg>
            </button>
          `;

          item.querySelector('.delete-inline-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            deleteSnippetInline(snippet.id);
          });

          listContainer.appendChild(item);
        });
      }

      function createNewSnippet() {
        const newSnippet = {
          id: generateUniqueId(),
          title: '',
          code: '',
          notes: '',
          lang: ''
        };
        snippets.push(newSnippet);
        saveToStorage();
        selectSnippet(newSnippet.id);
        document.getElementById('snippetTitle').focus();
        closeSidebarMobile();
      }

      function selectSnippet(id) {
        currentId = id;
        const snippet = snippets.find(s => s.id === id);

        if (snippet) {
          document.getElementById('emptyState').classList.add('hidden');
          document.getElementById('mainContent').classList.remove('hidden');

          document.getElementById('snippetTitle').value = snippet.title || '';
          document.getElementById('snippetCode').value = snippet.code || '';
          document.getElementById('snippetNotes').value = snippet.notes || '';
          document.getElementById('snippetLang').value = snippet.lang || '';

          updateCharCount(snippet.code || '');
          updateStatus(true);
          toggleCopyBtn();
          renderSidebar();
          closeSidebarMobile();
        }
      }

      function autoSaveCode() {
        const code = document.getElementById('snippetCode').value;
        updateCharCount(code);
        autoSave();
      }

      function updateCharCount(text) {
        const count = text.length;
        document.getElementById('charCount').textContent = `Символов: ${count}`;
      }

      function autoSave() {
        if (!currentId) return;

        const idx = snippets.findIndex(s => s.id === currentId);
        if (idx !== -1) {
          updateStatus(false);

          snippets[idx].title = document.getElementById('snippetTitle').value;
          snippets[idx].code = document.getElementById('snippetCode').value;
          snippets[idx].notes = document.getElementById('snippetNotes').value;
          snippets[idx].lang = document.getElementById('snippetLang').value;

          saveToStorage();
          toggleCopyBtn();

          clearTimeout(saveTimeout);
          saveTimeout = setTimeout(() => {
            renderSidebar();
            updateStatus(true);
          }, 400);
        }
      }

      function deleteSnippetInline(id) {
        idToDelete = id;
        document.getElementById('deleteModal').classList.remove('hidden');
      }

      function closeDeleteModal() {
        idToDelete = null;
        document.getElementById('deleteModal').classList.add('hidden');
      }

      function confirmDelete() {
        if (!idToDelete) return;
        
        const id = idToDelete;
        snippets = snippets.filter(s => s.id !== id);
        saveToStorage();

        if (currentId === id) {
          currentId = null;
          document.getElementById('mainContent').classList.add('hidden');
          document.getElementById('emptyState').classList.remove('hidden');
        }

        renderSidebar();
        closeDeleteModal();
      }

      function deleteCurrentSnippet() {
        if (!currentId) return;
        deleteSnippetInline(currentId);
      }

      function updateStatus(isSaved) {
        const statusDiv = document.getElementById('saveStatus');
        if (isSaved) {
          statusDiv.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span><span class="text-zinc-400">Сохранено</span>`;
        } else {
          statusDiv.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-ping"></span><span class="text-zinc-400">Сохранение...</span>`;
        }
      }

      function copyCode() {
        const codeText = document.getElementById('snippetCode').value;
        if (!codeText.trim()) return;
        navigator.clipboard.writeText(codeText).then(() => {
          const btnText = document.getElementById('copyBtnText');
          const original = btnText.textContent;
          btnText.textContent = 'Скопировано!';
          setTimeout(() => { btnText.textContent = original; }, 1500);
        }).catch(() => {
          const textarea = document.getElementById('snippetCode');
          textarea.select();
          document.execCommand('copy');
          const btnText = document.getElementById('copyBtnText');
          const original = btnText.textContent;
          btnText.textContent = 'Скопировано!';
          setTimeout(() => { btnText.textContent = original; }, 1500);
        });
      }

      function toggleCopyBtn() {
        const code = document.getElementById('snippetCode').value;
        const btn = document.getElementById('copyBtn');
        if (code && code.trim().length > 0) {
          btn.classList.remove('hidden');
        } else {
          btn.classList.add('hidden');
        }
      }

      function toggleWordWrap() {
        const codeArea = document.getElementById('snippetCode');
        const wrapBtn = document.getElementById('wrapBtn');
        isWordWrap = !isWordWrap;

        if (isWordWrap) {
          codeArea.classList.remove('whitespace-pre', 'overflow-auto');
          codeArea.classList.add('whitespace-pre-wrap', 'overflow-y-auto');
          wrapBtn.classList.add('bg-indigo-600/20', 'border-indigo-500/40', 'text-indigo-400');
        } else {
          codeArea.classList.add('whitespace-pre', 'overflow-auto');
          codeArea.classList.remove('whitespace-pre-wrap', 'overflow-y-auto');
          wrapBtn.classList.remove('bg-indigo-600/20', 'border-indigo-500/40', 'text-indigo-400');
        }
      }

      function saveToStorage() {
        try {
          localStorage.setItem('dev_memo_snippets', JSON.stringify(snippets));
        } catch (e) {
          console.error('Не удалось сохранить данные:', e);
          alert('Ошибка сохранения данных. Возможно, закончилось место в хранилище.');
        }
      }

      function exportData() {
        try {
          const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(snippets, null, 2));
          const downloadAnchor = document.createElement('a');
          downloadAnchor.setAttribute("href", dataStr);
          downloadAnchor.setAttribute("download", `devmemo_export_${Date.now()}.json`);
          document.body.appendChild(downloadAnchor);
          downloadAnchor.click();
          downloadAnchor.remove();
        } catch (e) {
          alert('Ошибка экспорта: ' + e.message);
        }
      }

      function importData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            const imported = JSON.parse(e.target.result);
            
            if (!Array.isArray(imported)) {
              alert('Файл должен содержать массив записей.');
              return;
            }

            if (imported.length === 0) {
              alert('Файл не содержит записей для импорта.');
              return;
            }

            const isValid = imported.every(item =>
              item.id && typeof item.title !== 'undefined' && typeof item.code !== 'undefined'
            );

            if (!isValid) {
              alert('Неверный формат данных. Каждая запись должна иметь id, title и code.');
              return;
            }

            if (confirm(`Импортировать ${imported.length} записей? Существующие записи будут объединены.`)) {
              const existingIds = new Set(snippets.map(s => s.id));
              let addedCount = 0;

              imported.forEach(item => {
                if (existingIds.has(item.id)) {
                  item.id = generateUniqueId();
                }
                snippets.push(item);
                addedCount++;
              });

              saveToStorage();
              renderSidebar();
              if (snippets.length > 0) {
                selectSnippet(snippets[snippets.length - 1].id);
              }
              alert(`Успешно импортировано ${addedCount} записей!`);
            }
          } catch(err) {
            alert('Ошибка при чтении файла: ' + err.message);
          }
        };
        reader.readAsText(file);
        event.target.value = '';
      }

      // ===== АДАПТИВНОЕ ЗАКРЫТИЕ САЙДБАРА =====
      window.addEventListener('resize', function () {
        if (window.innerWidth > 768 && sidebarOpen) {
          const sidebar = document.getElementById('sidebar');
          const overlay = document.getElementById('overlay');
          sidebar.classList.remove('-translate-x-full');
          sidebar.classList.add('translate-x-0');
          overlay.classList.add('hidden');
          sidebarOpen = false;
          document.body.style.overflow = '';
        }
      });

      // ===== ЗАКРЫТИЕ ПО ESC =====
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          if (document.getElementById('deleteModal').classList.contains('hidden') === false) {
            closeDeleteModal();
          }
          if (sidebarOpen && window.innerWidth <= 768) {
            toggleSidebar();
          }
        }
      });

    })();
  </script>
</body>

</html>
